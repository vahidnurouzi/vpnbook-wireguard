name: Update VPNBook Config

on:
  schedule:
    # هر ۵ روز یکبار ساعت ۲ بامداد به وقت UTC
    - cron: '0 2 */5 * *'
  workflow_dispatch:  # این گزینه رو می‌ذاریم که بشه به صورت دستی هم اجراش کرد

jobs:
  update-config:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Install Chromium browser
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Run Selenium script
      run: python get_vpnbook_config.py

    - name: Commit and push if config changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add vpnbook-wg.conf
        git diff --staged --quiet || git commit -m "Update VPNBook config"
        git push
